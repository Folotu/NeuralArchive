name: Process Raw Links

on:
  push:
    paths:
      - 'raw_links.txt'
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deduplicate raw_links.txt
        run: |
          if [ -f raw_links.txt ]; then
            awk '!seen[$0]++' raw_links.txt > raw_links.tmp && mv raw_links.tmp raw_links.txt
            echo "Deduplicated raw_links.txt"
          fi

      - name: Enrich links with intelligent metadata
        run: |
          node scripts/enrichLinksIntelligent.js

      - name: Deduplicate messages.json (keep oldest)
        run: |
          node scripts/findDupes.js --apply

      - name: Process into categorized_links.json
        run: |
          node scripts/processLinks.js

      - name: Build research graph
        run: |
          node scripts/buildGraph.js

      - name: Commit changes
        id: commit
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git add data/messages.json observatory/src/categorized_links.json observatory/src/research-graph.json raw_links.txt
            git commit -m "chore: process raw_links.txt -> update categorized_links"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-github-pages.yml',
              ref: 'main'
            })
